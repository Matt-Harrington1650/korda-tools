name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  web-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync release-aware Tauri config
        run: npm run version:sync

      - name: Build (TypeScript + Vite)
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Policy Scan - No Direct FS Imports In UI
        shell: bash
        run: |
          if rg -n "from 'fs'|require\('fs'\)|tauri.*fs|@tauri-apps/api/fs" src/pages src/components src/features; then
            echo "Forbidden direct filesystem usage found in UI layer."
            exit 1
          fi

      - name: Policy Scan - Governed Adapters Use Backend Gateway
        shell: bash
        run: |
          if rg -n "fetch\(" src/execution/adapters src/execution/helpers.ts; then
            echo "Direct frontend network egress detected in governed execution path."
            exit 1
          fi

      - name: Migration Chain Sanity
        shell: bash
        run: |
          rg -n "0015_create_governance_core.sql|0016_create_deliverables.sql|0017_harden_audit_chain.sql|0018_create_sheet_knowledge_tables.sql|0019_create_policy_controls.sql|0020_add_ai_review_fields.sql" src-tauri/src/lib.rs

      - name: Migration Authority Guard (Tauri Only)
        shell: bash
        run: |
          if rg -n "runMigrationsOnStartup|services/db/migrate" src src-tauri --glob '!src/services/db/migrate.ts' --glob '!src/services/db/sqlite.ts'; then
            echo "Non-authoritative TS migration runner reference detected outside experimental files."
            exit 1
          fi

      - name: Release Governance Consistency
        shell: bash
        run: |
          rg -n "^version\"\\s*:\\s*\"[0-9]+\\.[0-9]+\\.[0-9]+\"" package.json
          rg -n "^## \\[Unreleased\\]" CHANGELOG.md
          rg -n "^\\s*tagName:\\s*v__VERSION__$" .github/workflows/release-windows.yml
          rg -n "\"version\": \"../package.json\"" src-tauri/tauri.conf.json
          if rg -n "@REPO_OWNER" CODEOWNERS; then
            echo "CODEOWNERS placeholder detected."
            exit 1
          fi

      - name: Governance Docs Presence
        shell: bash
        run: |
          rg -n "Definition of Done|## Tests" docs/repo_governance_v1.md docs/constitution_v1.md docs/ai_storage_control_matrix_v1.md docs/ai_confidence_labeling_policy_v1.md
